services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: text2image-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-16000}:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      NEXT_TELEMETRY_DISABLED: 1
    volumes:
      - ./data:/app/data
